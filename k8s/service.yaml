apiVersion: v1
kind: Service
metadata:
  name: secure-config-service
  namespace: secure-app
spec:
  selector:
    app: secure-config
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-config-ingress
  namespace: secure-app
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - your-domain.com
      secretName: secure-config-tls
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secure-config-service
                port:
                  number: 80
