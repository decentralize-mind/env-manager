name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: env-manager-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: env-manager-aarch64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: env-manager-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: env-manager-aarch64-unknown-linux-gnu.tar.gz

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose
      
      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact_name }} env-manager
          cd ../../..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
  
  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            */env-manager-*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  update-homebrew:
    name: Update Homebrew Formula
    needs: create-release
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: decentralize-mind/homebrew-env-manager
          token: ${{ secrets.PAT_TOKEN }}
          path: homebrew-tap
      
      - name: Calculate SHA256
        run: |
          # Download the macOS Apple Silicon binary
          curl -L -o binary.tar.gz \
            https://github.com/decentralize-mind/env-manager/releases/download/${{ github.ref_name }}/env-manager-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
          
          # Calculate SHA256
          SHA256=$(shasum -a 256 binary.tar.gz | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          
          # Extract version (remove 'v' prefix)
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Update Formula
        run: |
          cat > homebrew-tap/Formula/env-manager.rb << EOF
          class EnvManager < Formula
            desc "Enterprise-grade secrets management with Web3 security features"
            homepage "https://github.com/decentralize-mind/env-manager"
            url "https://github.com/decentralize-mind/env-manager/releases/download/v${{ env.VERSION }}/env-manager-${{ env.VERSION }}-aarch64-apple-darwin.tar.gz"
            sha256 "${{ env.SHA256 }}"
            license "MIT"

            def install
              bin.install "env-manager"
            end

            test do
              system "\#{bin}/env-manager", "--help"
            end
          end
          EOF
      
      - name: Commit and Push
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/env-manager.rb
          git commit -m "Update to v${{ env.VERSION }}"
          git push
